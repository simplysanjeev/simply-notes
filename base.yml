# /base.yml
theme:
  name: material
  features:
#    - navigation.tabs
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: custom

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format